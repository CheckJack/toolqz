# Production stack for Hostinger VPS with Docker.
# Usage on server:
#   cp .env.example .env   # set DATABASE_URL to postgresql://toolqz:STRONG_PASSWORD@db:5432/toolqz
#   docker compose -f deploy/docker-compose.prod.yml up -d --build
#   docker compose -f deploy/docker-compose.prod.yml exec app npx tsx prisma/seed.ts

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: toolqz
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: toolqz
    volumes:
      - toolqz_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U toolqz -d toolqz"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - toolqz

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://toolqz:${POSTGRES_PASSWORD}@db:5432/toolqz?schema=public
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - toolqz

volumes:
  toolqz_pg_data:

networks:
  toolqz:
