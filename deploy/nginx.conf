# Nginx reverse proxy for TOOLQZ on Hostinger VPS.
# 1. Replace YOUR_DOMAIN with your domain (e.g. toolqz.com)
# 2. sudo cp deploy/nginx.conf /etc/nginx/sites-available/toolqz
# 3. sudo ln -sf /etc/nginx/sites-available/toolqz /etc/nginx/sites-enabled/
# 4. sudo nginx -t && sudo systemctl reload nginx
# 5. sudo certbot --nginx -d YOUR_DOMAIN -d www.YOUR_DOMAIN

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
